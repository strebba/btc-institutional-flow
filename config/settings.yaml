# ─── GENERAL ────────────────────────────────────────────────────────────────────
project:
  name: ibit-gamma-tracker
  version: "0.1.0"
  log_level: INFO           # DEBUG | INFO | WARNING | ERROR
  log_file: logs/tracker.log

# ─── DATABASE ───────────────────────────────────────────────────────────────────
database:
  path: data/structured_notes.db

# ─── SEC EDGAR ──────────────────────────────────────────────────────────────────
edgar:
  base_url: https://efts.sec.gov/LATEST/search-index
  # PLACEHOLDER — NON usare così com'è: SEC EDGAR richiede un'email reale nei ToS
  # (https://www.sec.gov/os/accessing-edgar-data); un indirizzo fittizio rischia il ban IP.
  # In locale: env var / .env  EDGAR_USER_AGENT="ibit-gamma-tracker/1.0 (tua@email.com)"
  # In CI: Repository variable EDGAR_USER_AGENT (vedi .github/workflows/edgar-refresh.yml).
  # Se resta un placeholder *example.com*, get_settings() logga un WARNING.
  user_agent: "ibit-gamma-tracker/1.0 (you@example.com)"
  rate_limit_rps: 8          # max 10/s → usiamo 8 per sicurezza
  max_retries: 3
  retry_delay_s: 1.0
  page_size: 100
  search_terms:
    - "IBIT"
    - "iShares Bitcoin Trust"
    - "FBTC"
    - "BITB"
    - "ARKB"
  forms:
    - "424B2"
    - "424B3"
  start_date: "2024-01-01"
  known_issuers:
    - "JPMorgan"
    - "Morgan Stanley"
    - "Goldman Sachs"
    - "Barclays"
    - "Citigroup"
    - "Bank of America"
    - "UBS"
    - "Credit Suisse"
    - "Wells Fargo"
    - "HSBC"
    - "BNP Paribas"
    - "Societe Generale"

# ─── DERIBIT ────────────────────────────────────────────────────────────────────
deribit:
  base_url: https://www.deribit.com/api/v2/public
  rate_limit_rps: 15         # max 20/s → usiamo 15
  max_retries: 3
  retry_delay_s: 0.5
  contract_size: 1.0         # 1 BTC per contratto opzione BTC su Deribit
  gex_threshold_usd: 1_000_000  # threshold per classificare regime "neutral"

# ─── FLOWS ──────────────────────────────────────────────────────────────────────
flows:
  farside_url: "https://farside.co.uk/bitcoin-etf-flow-all-data/"
  btc_ticker: "BTC-USD"
  ibit_ticker: "IBIT"
  lookback_days: 365
  sosovalue_api_key: ""        # registrarsi su sosovalue.com (free tier)
  edgar_nport_cik: "0001980994"  # IBIT CIK su SEC EDGAR

# ─── ANALYTICS ──────────────────────────────────────────────────────────────────
analytics:
  granger_max_lags: 10
  correlation_windows: [30, 60, 90]
  event_window_days: 5       # [-5, +5] per event study
  barrier_proximity_pct: 2.0 # "near barrier" se spot entro 2%
  ibit_btc_ratio: 0.0006     # approx BTC per share IBIT (aggiornare se cambia)

# ─── BACKTEST ───────────────────────────────────────────────────────────────────
backtest:
  long_gex_threshold: 0
  long_flow_threshold_usd_m: 100
  short_gex_threshold: 0
  short_flow_threshold_usd_m: -200
  barrier_exclusion_pct: 5.0

# ─── COINGLASS ──────────────────────────────────────────────────────────────────
coinglass:
  api_key: ""            # override con env var COINGLASS_API_KEY (non committare la chiave)
  base_url: "https://open-api-v4.coinglass.com"
  timeout_s: 15
  rate_limit_rps: 1      # 80 req/min startup tier → 1/s per sicurezza

# ─── ALERTS (Telegram) ──────────────────────────────────────────────────────────
# Abilita il bot Telegram con TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID come env vars.
# Senza env vars l'API parte lo stesso, gli alert sono semplicemente disabilitati.
alerts:
  telegram_enabled: true
  daily_recap:
    hour_utc: 12           # 12:45 UTC = 14:45 Italia (CEST)
    minute_utc: 45
  etf_flow_check:
    interval_hours: 4                            # ogni 4 ore controlla i flussi
    single_day_usd_threshold: 500_000_000        # ±$500M giornaliero
    cumulative_7d_usd_threshold: 2_000_000_000   # ±$2B cumulativo 7 giorni
    streak_min_days: 3                           # 3+ giorni stessa direzione
  cooldown_hours: 24       # min intervallo tra alert dello stesso tipo

# ─── DASHBOARD ──────────────────────────────────────────────────────────────────
dashboard:
  refresh_interval_s: 900    # 15 minuti
  theme:
    background: "#000000"    # Wagmi Lab — pure black
    surface:    "#0d0d0d"    # card/sidebar surface (near-black)
    border:     "#1a1a1a"    # subtle dark borders
    text:       "#FFFFFF"    # Wagmi Lab — pure white
    text_muted: "#888888"    # secondary labels / captions
    grid:       "#111111"    # chart gridlines
    positive:   "#00FF9D"    # Wagmi Lab — neon green (main accent)
    negative:   "#FF0033"    # Wagmi Lab — red
    neutral:    "#FFFFFF"    # white — spot/BTC lines
    accent:     "#FF6600"    # Wagmi Lab — orange accent

# ─── FORECAST (spine predizione → esito → calibrazione) ───────────────────────────
forecast:
  enabled: true              # false = scheduler forecast non avviato
  horizon_days: 5            # orizzonte di default delle predizioni dealer-flow
  freshness_max_hours: 30    # oltre questo, /api/forecast/status segnala dati stale
  schedule:
    predict_hour_utc: 7      # generazione predizioni giornaliera
    predict_minute_utc: 30
    verify_hour_utc: 8       # verifica esiti maturi
    verify_minute_utc: 0
    calibrate_dow: mon       # calibrazione settimanale (lun)
    calibrate_hour_utc: 8
    calibrate_minute_utc: 30
