# Pesi del SignalModel dealer-flow — prior + governance della calibrazione.
#
# I prior sono il punto di partenza "congelato" dello Stage 1 (assisted). La calibrazione
# (fase 2) propone nuove versioni che restano `proposed` finché Stefano non le attiva
# (workflow Tuning, human-gated). I pesi attivi vivono nella tabella weight_versions del DB;
# questo file è la sorgente dei prior e dei parametri di guardrail.

priors:
  gex:            0.135   # rescalato ×0.90 per fare spazio a granger_lead
  etf_flow:       0.135
  funding_rate:   0.180
  oi_change:      0.135
  long_short:     0.135
  put_call:       0.090
  liquidations:   0.090
  granger_lead:   0.100   # ETF flow lag 5gg (Granger p≈0.03, lead documentato)

calibration:
  min_scored: 20          # abbassato da 30: ~7 gg operativi con 3 pred/giorno, campione v1 omogeneo
  min_scored_gex: 30      # abbassato da 40: GEX in regime stabile ha bassa varianza iniziale
  max_step: 0.05          # variazione massima per peso per ciclo di calibrazione
  shrinkage: 0.30         # blend verso i prior (0=ignora prior, 1=resta sui prior)
  learning_rate: 0.50     # intensità del tilt verso le componenti con IC positivo
  min_oos_improvement: 0.0  # miglioramento OOS minimo (hit-rate) per accettare la proposta

governance:
  kill_switch: false      # true = pausa generazione predizioni
  freeze_weights: true    # true = i pesi restano ai prior (Stage 1); false = consente attivazione calibrazione
  model_version: "v1"     # versione corrente del SignalModel (8 componenti con granger_lead)
  unfreeze_criteria:      # criteri qualitativi per flip manuale a false (2 cicli consecutivi soddisfatti)
    min_direction_hit_rate: 0.45
    min_prob_brier_threshold: 0.28   # sotto questa soglia = meglio del caso casuale
    min_scored_direction: 15
