name: EDGAR refresh (settimanale)

# Refresh incrementale delle note strutturate IBIT da SEC EDGAR.
# Esegue scripts/cron_edgar.py e committa il DB aggiornato su main (il filesystem
# di DigitalOcean App Platform è effimero, quindi la fonte di verità è il DB
# versionato nel repo; il push su main triggera il deploy).
#
# Lo User-Agent SEC è in config/settings.yaml (email reale), quindi non servono
# variabili esterne. Override opzionale via env var EDGAR_USER_AGENT.

on:
  schedule:
    - cron: "30 6 * * 1"   # lunedì 06:30 UTC — primario
    - cron: "30 6 * * 3"   # mercoledì 06:30 UTC — backup (recupera se lunedì fallisce)
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Giorni di lookback (default 30 per il run schedulato)"
        required: false
        default: "30"
        type: string

permissions:
  contents: write           # per committare il DB aggiornato

concurrency:
  group: edgar-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EDGAR refresh
        env:
          PYTHONPATH: .
          EDGAR_USER_AGENT: ${{ vars.EDGAR_USER_AGENT }}
          EDGAR_LOOKBACK_DAYS: ${{ inputs.lookback_days || '30' }}
        run: python scripts/cron_edgar.py

      - name: Commit DB if changed
        run: |
          if [[ -n "$(git status --porcelain data/structured_notes.db)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/structured_notes.db
            git commit -m "chore(edgar): refresh settimanale automatico [skip ci]"
            git push
          else
            echo "Nessuna modifica al DB — niente da committare."
          fi

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [[ -z "$TELEGRAM_BOT_TOKEN" || -z "$TELEGRAM_CHAT_ID" ]]; then
            echo "Telegram secrets non configurati — skip notifica"
            exit 0
          fi
          MSG="⚠️ <b>EDGAR refresh FALLITO</b>%0A"
          MSG+="Run: <a href='${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}'>${GITHUB_RUN_ID}</a>%0A"
          MSG+="Data: $(date -u +'%Y-%m-%d %H:%M UTC')%0A"
          MSG+="Branch: ${GITHUB_REF_NAME}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            -d "text=${MSG}" > /dev/null
